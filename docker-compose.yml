services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: histograph
      POSTGRES_USER: histograph
      POSTGRES_PASSWORD: histograph
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U histograph -d histograph"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      args:
        NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: HistographBot
    environment:
      DATABASE_URL: postgresql://histograph:histograph@postgres:5432/histograph
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
